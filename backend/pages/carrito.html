<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito — NETPOLIX</title>
  <link rel="stylesheet" href="/static/css/global.css">
  <link rel="stylesheet" href="/static/css/navbar.css">
  <link rel="stylesheet" href="/static/css/drawer.css">
  <link rel="stylesheet" href="/static/css/dashboard.css">
  <link rel="stylesheet" href="/static/css/carrito.css">
</head>
<body class="page-inner">
  <nav class="navbar scrolled" id="navbar">
    <div class="navbar-left">
      <a class="navbar-logo" href="/dashboard">NETPOLIX</a>
      <div class="navbar-links" id="navbarLinks">
        <a href="/dashboard" class="nav-link">Inicio</a>
        <a href="/carrito" class="nav-link active">Carrito</a>
      </div>
    </div>
    <div class="navbar-right">
      <a href="/carrito" class="nav-cart" aria-label="Carrito">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-badge" id="cartBadge">0</span>
      </a>
      <button type="button" class="nav-mi-lista" id="btnMiLista">Mi Lista</button>
      <div class="nav-profile" id="navProfile">
        <button type="button" class="profile-avatar" id="profileAvatar">U</button>
        <div class="profile-dropdown" id="profileDropdown">
          <div class="dropdown-header">
            <div class="dropdown-avatar" id="dropdownAvatar">U</div>
            <div><p class="dropdown-name" id="dropdownName">Usuario</p><p class="dropdown-email" id="dropdownEmail">—</p></div>
          </div>
          <hr class="dropdown-divider">
          <a href="/perfil" class="dropdown-item">👤 Mi perfil</a>
          <a href="/dashboard" class="dropdown-item">🏠 Catálogo</a>
          <hr class="dropdown-divider">
          <button type="button" class="dropdown-item dropdown-logout" id="btnLogout">🚪 Cerrar sesión</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="cart-page">
    <h1 class="page-title">Tu carrito</h1>
    <div id="cartContent"></div>
  </main>

  <div class="drawer-overlay" id="drawerOverlay"></div>
  <div class="mi-lista-drawer" id="miListaDrawer">
    <div class="drawer-header"><h2 class="drawer-title">❤️ Mi Lista</h2><button type="button" class="drawer-close" id="drawerClose">✕</button></div>
    <div class="drawer-content" id="drawerContent"></div>
    <div class="drawer-empty" id="drawerEmpty"><div class="drawer-empty-icon">🎬</div><p>Tu lista está vacía</p></div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script type="module" src="/static/js/carrito-page.js"></script>
</body>
</html>
