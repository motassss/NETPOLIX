<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NETPOLIX</title>
  <link rel="stylesheet" href="/static/css/global.css">
  <link rel="stylesheet" href="/static/css/navbar.css">
  <link rel="stylesheet" href="/static/css/drawer.css">
  <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body>
  <nav class="navbar scrolled" id="navbar">
    <div class="navbar-left">
      <button type="button" class="nav-mobile-toggle" id="navMobileToggle" aria-label="Menú">☰</button>
      <a class="navbar-logo" href="/dashboard">NETPOLIX</a>
      <div class="navbar-links" id="navbarLinks">
        <a href="/dashboard" class="nav-link active">Inicio</a>
        <a href="/dashboard#cat-drama" class="nav-link">Series</a>
        <a href="/dashboard#catalogo" class="nav-link">Películas</a>
        <a href="/dashboard#cat-tendencias" class="nav-link">Novedades</a>
      </div>
    </div>
    <div class="navbar-right">
      <div class="nav-search">
        <button type="button" class="search-toggle" id="searchToggle" aria-label="Buscar">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
        <input type="text" class="search-input" id="searchInput" placeholder="Buscar películas..." autocomplete="off">
      </div>
      <a href="/carrito" class="nav-cart" aria-label="Carrito">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-badge" id="cartBadge">0</span>
      </a>
      <button type="button" class="nav-mi-lista" id="btnMiLista">Mi Lista</button>
      <div class="nav-profile" id="navProfile">
        <button type="button" class="profile-avatar" id="profileAvatar" aria-label="Perfil">U</button>
        <div class="profile-dropdown" id="profileDropdown">
          <div class="dropdown-header">
            <div class="dropdown-avatar" id="dropdownAvatar">U</div>
            <div>
              <p class="dropdown-name" id="dropdownName">Usuario</p>
              <p class="dropdown-email" id="dropdownEmail">—</p>
            </div>
          </div>
          <hr class="dropdown-divider">
          <a href="/perfil" class="dropdown-item">👤 Mi perfil</a>
          <a href="/carrito" class="dropdown-item">🛒 Mi carrito</a>
          <a href="/perfil#config" class="dropdown-item">⚙️ Configuración</a>
          <hr class="dropdown-divider">
          <button type="button" class="dropdown-item dropdown-logout" id="btnLogout">🚪 Cerrar sesión</button>
        </div>
      </div>
    </div>
  </nav>

  <section id="hero" class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <div class="hero-price-pill" id="heroPrice">$3.99 <span>/ 30 días</span></div>
      <h1 id="heroTitle" class="hero-title">NETPOLIX</h1>
      <p id="heroDesc" class="hero-desc"></p>
      <div class="hero-meta">
        <span id="heroYear"></span>
        <span id="heroDuration"></span>
      </div>
      <div class="hero-buttons">
        <button type="button" class="hero-btn hero-btn-primary" id="heroPrimary">🛒 Rentar ahora</button>
        <button type="button" class="hero-btn hero-btn-secondary" id="heroSecondary">ⓘ Más información</button>
      </div>
    </div>
  </section>

  <main class="main-content" id="catalogo">
    <div id="categorias-container"></div>
  </main>

  <div id="movieModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <button class="modal-close" type="button" aria-label="Cerrar">✕</button>
      <img id="modalImg" src="" alt="" class="modal-img" onerror="this.src='/static/img/placeholder.jpg'">
      <div class="modal-body">
        <h2 id="modalTitle" class="modal-title"></h2>
        <div class="modal-meta">
          <span id="modalYear" class="meta-tag"></span>
          <span id="modalDuration" class="meta-tag"></span>
          <span id="modalType" class="meta-tag"></span>
        </div>
        <p id="modalDesc" class="modal-desc"></p>
        <a id="modalTrailer" href="#" target="_blank" rel="noopener" class="modal-trailer hidden">Ver tráiler ↗</a>
        <div id="modalActions" class="modal-actions"></div>
        <p id="modalNotice" class="rental-notice"></p>
      </div>
    </div>
  </div>

  <div class="drawer-overlay" id="drawerOverlay"></div>
  <div class="mi-lista-drawer" id="miListaDrawer">
    <div class="drawer-header">
      <h2 class="drawer-title">❤️ Mi Lista</h2>
      <button type="button" class="drawer-close" id="drawerClose" aria-label="Cerrar">✕</button>
    </div>
    <div class="drawer-content" id="drawerContent"></div>
    <div class="drawer-empty" id="drawerEmpty">
      <div class="drawer-empty-icon">🎬</div>
      <p>Tu lista está vacía</p>
      <span>Agrega películas desde el catálogo</span>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script type="module" src="/static/js/dashboard.js"></script>
</body>
</html>
