
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☆*: .｡. o(≧▽≦)o .｡.:*☆ NET POLIX :3 </title>
    <link rel="stylesheet" href="/static/css/login.css">
</head>
<body>
    <div class="auth-container">
    </div class="auth-card">
        <h1> Net Polix </h1>
        <h2> INICIAR SESION </h2>

        <div id="error-message" class="error-message hidden"></div>

  <form id="login-form">
                <div class="form-group">
                    <label for="cedula">Cédula</label>
                    <input type="text" id="cedula" required placeholder="Tu documento de identidad">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required minlength="6">
                </div>
                <button type="submit" class="btn-primary" id="submit-btn">
                    Entrar
                </button>
            </form>
            
            <p class="auth-link">
                ¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a>
            </p>
        </div>
    </div>
    
    <script type="module">
        import { api } from "../js/api.js";
        import { auth } from "../js/auth.js";
        
        // Si ya está autenticado, redirigir al dashboard
        if (auth.estaAutenticado()) {
            window.location.href = "dashboard.html";
        }
        
        document.getElementById("login-form").addEventListener("submit", async (e) => {
            e.preventDefault(); // Evita que el formulario recargue la página
            
            const cedula = document.getElementById("cedula").value;
            const password = document.getElementById("password").value;
            const btn = document.getElementById("submit-btn");
            const errorDiv = document.getElementById("error-message");
            
            // Deshabilitamos el botón mientras carga
            btn.disabled = true;
            btn.textContent = "Cargando...";
            errorDiv.classList.add("hidden");
            
            try {
                await api.auth.login(cedula, password);
                window.location.href = "dashboard.html"; // Login exitoso
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.remove("hidden");
            } finally {
                btn.disabled = false;
                btn.textContent = "Entrar";
            }
        });
    </script>
</body>
</html>
